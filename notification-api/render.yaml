services:

  - type: web
    name: notification-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notification-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: notification-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: notification-redis
          type: redis
          property: port
      - key: RABBITMQ_HOST
        sync: false       
      - key: RABBITMQ_PORT
        value: "5672"
      - key: SECRET_KEY
        generateValue: true   

  - type: worker
    name: notification-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notification-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: notification-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: notification-redis
          type: redis
          property: port
      - key: RABBITMQ_HOST
        sync: false
      - key: RABBITMQ_PORT
        value: "5672"
      - key: SECRET_KEY
        sync: false

databases:
  - name: notification-db
    plan: free